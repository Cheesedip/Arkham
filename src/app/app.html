<style>
  :host {
    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);

    --surface-deep: #0d121b;
    --surface-panel: #161f2b;
    --surface-raised: #1f2a39;
    --text-primary: #e7edf7;
    --text-muted: #b6c1d2;
    
    --orange-red: oklch(63.32% 0.24 31.68);
    --vivid-pink: oklch(69.02% 0.277 332.77);
    --electric-violet: oklch(53.18% 0.28 296.97);

    --red-to-pink-to-purple-horizontal-gradient: linear-gradient(
      90deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: block;
    height: 100dvh;
    color: var(--text-primary);
    background:
      radial-gradient(circle at 12% 14%, rgba(255, 168, 94, 0.16), transparent 34%),
      radial-gradient(circle at 88% 8%, rgba(255, 83, 149, 0.14), transparent 30%),
      linear-gradient(160deg, #0a0f17 0%, var(--surface-deep) 46%, #121a26 100%);
  }

  .tabs-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }

  .tab-buttons {
    display: flex;
    gap: 1rem;
    padding: 1.5rem;
    background: rgba(7, 10, 15, 0.78);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--red-to-pink-to-purple-horizontal-gradient);
  }

  .tab-button {
    padding: 0.75rem 1.5rem;
    background: transparent;
    border: 2px solid transparent;
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 0.5rem;
    transition: all 0.3s ease;
  }

  .tab-button:hover {
    color: var(--text-primary);
    border-color: var(--vivid-pink);
  }

  .tab-button.active {
    color: white;
    background: var(--red-to-pink-to-purple-horizontal-gradient);
    border-color: transparent;
  }

  .toolbar-spacer {
    flex: 1;
  }

  .resolutions-button {
    margin-left: auto;
  }

  .tab-content {
    flex: 1;
    overflow: auto;
    padding: 2rem;
    background: linear-gradient(180deg, rgba(22, 31, 43, 0.7), rgba(13, 18, 27, 0.78));
  }
</style>

<main class="tabs-container">
  <div class="tab-buttons">
    <button 
      class="tab-button" 
      [class.active]="activeTab() === 1"
      (click)="setTab(1)">
      Act 1
    </button>
    <button 
      class="tab-button" 
      [class.active]="activeTab() === 2"
      (click)="setTab(2)">
      Act 2
    </button>
    <button 
      class="tab-button" 
      [class.active]="activeTab() === 3"
      (click)="setTab(3)">
      Act 3
    </button>
    <div class="toolbar-spacer" aria-hidden="true"></div>
    <button
      class="tab-button resolutions-button"
      [class.active]="activeTab() === 4"
      (click)="openResolutions()">
      Resolutions
    </button>
  </div>

  <div class="tab-content">
    @if (activeTab() === 1) {
      <app-act-1></app-act-1>
    }
    @if (activeTab() === 2) {
      <app-act-2></app-act-2>
    }
    @if (activeTab() === 3) {
      <app-act-3></app-act-3>
    }
    @if (activeTab() === 4) {
      <app-resolutions></app-resolutions>
    }
  </div>
</main>
